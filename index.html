<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta para ti</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#ff7aa2,#ffd6e7);
font-family:Georgia,serif;
overflow:hidden;
transition:2s;
}

/* estrellas */

.estrellas{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
opacity:0;
pointer-events:none;
}

.estrella{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:brillar 2s infinite alternate;
}

@keyframes brillar{
from{opacity:.2}
to{opacity:1}
}

/* sobre */

.sobre{
position:relative;
width:360px;
height:230px;
perspective:1000px;
}

.base{
position:absolute;
width:100%;
height:100%;
background:#ff9bb5;
border-radius:8px;
}

.tapa{
position:absolute;
width:100%;
height:100%;
background:#ff6f93;
clip-path:polygon(0 0,100% 0,50% 65%);
transform-origin:top;
transition:1.5s;
z-index:5;
}

.abierto .tapa{
transform:rotateX(180deg);
}

/* carta */

.carta{
position:absolute;
width:90%;
left:5%;
top:40px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
text-align:center;
transform:translateY(90px);
transition:2s;
z-index:3;
}

.abierto .carta{
transform:translateY(-140px);
}

/* corazón abrir */

.corazon{
position:absolute;
top:85px;
left:50%;
transform:translateX(-50%);
font-size:45px;
cursor:pointer;
animation:latir 1s infinite;
z-index:6;
}

@keyframes latir{
0%{transform:translateX(-50%) scale(1)}
50%{transform:translateX(-50%) scale(1.25)}
100%{transform:translateX(-50%) scale(1)}
}

/* botón poema */

.poemaBtn{
font-size:28px;
background:none;
border:none;
cursor:pointer;
margin-top:15px;
}

/* fuego */

.quemar{
animation:quemar 2.5s forwards;
}

@keyframes quemar{

0%{
transform:scale(1);
filter:none;
}

40%{
filter:hue-rotate(80deg) brightness(1.3);
}

70%{
transform:scale(.8) rotate(3deg);
}

100%{
opacity:0;
transform:scale(.1);
}

}

/* poema final */

.poemaFinal{
position:absolute;
color:white;
font-size:26px;
text-align:center;
width:80%;
opacity:0;
line-height:1.5;
}

</style>
</head>

<body>

<div class="estrellas" id="estrellas"></div>

<div class="sobre" id="sobre">

<div class="base"></div>
<div class="tapa"></div>

<div class="corazon" id="abrir">❤️</div>

<div class="carta" id="carta">

<p id="texto"></p>

<button class="poemaBtn" id="poemaBtn">🫀</button>

</div>

</div>

<div class="poemaFinal" id="poemaFinal"></div>

<script>

/* texto carta */

const mensaje=`amor eres todo para mí siempre estaré a tu lado porque te amo demasiado.

Jamás pienses que no te amo,
porque te pienso cada segundo.

Para mí eres todo lo que amo,
todo lo que quiero en esta vida.

Te amo mi niña ❤️`

let i=0

function escribir(){

if(i<mensaje.length){

document.getElementById("texto").innerHTML+=mensaje.charAt(i)

i++

setTimeout(escribir,35)

}

}

/* abrir carta */

document.getElementById("abrir").onclick=()=>{

document.getElementById("sobre").classList.add("abierto")

escribir()

}

/* poema */

const poema=`Si el cielo tuviera un nombre
sería el tuyo.

Si el amor tuviera un rostro
sería tu sonrisa.

Porque cada estrella
me recuerda
que mi universo
eres tú.`

let j=0

function escribirPoema(){

if(j<poema.length){

document.getElementById("poemaFinal").innerHTML+=poema.charAt(j)

j++

setTimeout(escribirPoema,45)

}

}

document.getElementById("poemaBtn").onclick=()=>{

document.getElementById("carta").classList.add("quemar")

setTimeout(()=>{

document.body.style.background="#02020f"

document.getElementById("estrellas").style.opacity=1

document.getElementById("poemaFinal").style.opacity=1

escribirPoema()

},2000)

}

/* crear estrellas */

for(let s=0;s<180;s++){

let star=document.createElement("div")

star.className="estrella"

star.style.top=Math.random()*100+"vh"

star.style.left=Math.random()*100+"vw"

star.style.animationDuration=(Math.random()*2+1)+"s"

document.getElementById("estrellas").appendChild(star)

}

</script>

</body>
</html>
